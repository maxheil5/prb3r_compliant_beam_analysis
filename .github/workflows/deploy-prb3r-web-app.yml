name: Deploy PRB 3R Web App

on:
  push:
    branches: [main, master]
    paths:
      - "web_app/**"
      - "scripts/export_web_app_data.py"
      - "results/csv/**"
      - ".github/workflows/deploy-prb3r-web-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python export dependencies
        run: python -m pip install -r requirements.txt

      - name: Export static app data
        run: python scripts/export_web_app_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web app dependencies
        working-directory: web_app
        run: npm install

      - name: Check web app data
        working-directory: web_app
        run: npm run check

      - name: Build web app
        working-directory: web_app
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
